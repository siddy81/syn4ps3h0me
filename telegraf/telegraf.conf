[agent]
  interval = "10s"
  round_interval = true
  flush_interval = "10s"
  omit_hostname = true
  debug = true

# ------------------------------
# Shelly Status (Power/PM)
# ------------------------------
[[inputs.mqtt_consumer]]
  servers = ["tcp://mosquitto:1883"]
  topics = ["+/status/switch:0"]
  username = "${MQTT_USER}"
  password = "${MQTT_PASSWORD}"
  qos = 0
  persistent_session = false
  topic_tag = "topic"
  data_format = "json_v2"
  name_override = "shelly_status"

  [[inputs.mqtt_consumer.json_v2]]
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "apower"
      rename = "apower"
      type = "float"
      optional = true
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "voltage"
      rename = "voltage"
      type = "float"
      optional = true
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "current"
      rename = "current"
      type = "float"
      optional = true
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "aenergy.total"
      rename = "aenergy_total"
      type = "float"
      optional = true
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "temperature.tC"
      rename = "temperature_c"
      type = "float"
      optional = true
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "output"
      rename = "output"
      type = "bool"
      optional = true

# Raw-Stream (Debug/Forensik)
[[inputs.mqtt_consumer]]
  servers = ["tcp://mosquitto:1883"]
  topics = ["+/status/#", "+/events/rpc", "shellies/announce"]
  username = "${MQTT_USER}"
  password = "${MQTT_PASSWORD}"
  qos = 0
  persistent_session = false
  topic_tag = "topic"
  data_format = "value"
  data_type = "string"
  name_override = "shelly_raw"

# ------------------------------
# Shelly H&T G3 (S3SN-0U12A)
# ------------------------------
[[inputs.mqtt_consumer]]
  servers = ["tcp://mosquitto:1883"]
  topics = ["+/status/temperature:0"]
  client_id = "telegraf-shelly-ht-temp"
  username = "${MQTT_USER}"
  password = "${MQTT_PASSWORD}"
  qos = 0
  persistent_session = false
  topic_tag = "topic"
  data_format = "json_v2"
  name_override = "shelly_ht"

  [[inputs.mqtt_consumer.json_v2]]
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "tC"
      rename = "temperature_c"
      type = "float"

[[inputs.mqtt_consumer]]
  servers = ["tcp://mosquitto:1883"]
  topics = ["+/status/humidity:0"]
  client_id = "telegraf-shelly-ht-humidity"
  username = "${MQTT_USER}"
  password = "${MQTT_PASSWORD}"
  qos = 0
  persistent_session = false
  topic_tag = "topic"
  data_format = "json_v2"
  name_override = "shelly_ht"

  [[inputs.mqtt_consumer.json_v2]]
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "rh"
      rename = "humidity_pct"
      type = "float"

[[inputs.mqtt_consumer]]
  servers = ["tcp://mosquitto:1883"]
  topics = ["+/status/devicepower:0"]
  client_id = "telegraf-shelly-ht-battery"
  username = "${MQTT_USER}"
  password = "${MQTT_PASSWORD}"
  qos = 0
  persistent_session = false
  topic_tag = "topic"
  data_format = "json_v2"
  name_override = "shelly_ht"

  [[inputs.mqtt_consumer.json_v2]]
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "battery.percent"
      rename = "battery_pct"
      type = "float"
      optional = true

# ------------------------------
# Shelly BLU Motion via Gateway-Script
# erwartet Topics:
# shellies/blu/<device>/motion  (Payload: ON/OFF)
# shellies/blu/<device>/event   (JSON)
# shellies/blu/<device>/telemetry (JSON)
# ------------------------------
[[inputs.mqtt_consumer]]
  servers = ["tcp://mosquitto:1883"]
  topics = ["shellies/blu/+/motion"]
  username = "${MQTT_USER}"
  password = "${MQTT_PASSWORD}"
  qos = 1
  persistent_session = false
  topic_tag = "topic"
  data_format = "value"
  data_type = "string"
  name_override = "shelly_blu"

[[inputs.mqtt_consumer]]
  servers = ["tcp://mosquitto:1883"]
  topics = ["shellies/blu/+/event"]
  username = "${MQTT_USER}"
  password = "${MQTT_PASSWORD}"
  qos = 1
  persistent_session = false
  topic_tag = "topic"
  data_format = "json_v2"
  name_override = "shelly_blu"

  [[inputs.mqtt_consumer.json_v2]]
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "state"
      rename = "state"
      type = "string"
      optional = true
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "reason"
      rename = "reason"
      type = "string"
      optional = true
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "rssi"
      rename = "rssi"
      type = "int"
      optional = true
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "battery"
      rename = "battery"
      type = "float"
      optional = true
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "illuminance"
      rename = "illuminance"
      type = "float"
      optional = true
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "ts"
      rename = "event_ts"
      type = "int"
      optional = true

[[inputs.mqtt_consumer]]
  servers = ["tcp://mosquitto:1883"]
  topics = ["shellies/blu/+/telemetry"]
  username = "${MQTT_USER}"
  password = "${MQTT_PASSWORD}"
  qos = 1
  persistent_session = false
  topic_tag = "topic"
  data_format = "json_v2"
  name_override = "shelly_blu"

  [[inputs.mqtt_consumer.json_v2]]
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "motion"
      rename = "motion"
      type = "int"
      optional = true
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "window"
      rename = "window"
      type = "int"
      optional = true
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "battery"
      rename = "battery"
      type = "float"
      optional = true
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "illuminance"
      rename = "illuminance"
      type = "float"
      optional = true
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "rssi"
      rename = "rssi"
      type = "int"
      optional = true
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "pid"
      rename = "pid"
      type = "int"
      optional = true
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "ts"
      rename = "event_ts"
      type = "int"
      optional = true

# device aus Topic extrahieren: shellies/blu/<device>/...
# WICHTIG: $$1 damit Telegraf-Env-Interpolation nicht dazwischenfunkt
[[processors.regex]]
  namepass = ["shelly_blu"]
  [[processors.regex.tags]]
    key = "topic"
    pattern = "shellies/blu/([^/]+)/.*"
    replacement = "$$1"
    result_key = "topic"

# ON/OFF -> 1/0 für Grafana
[[processors.enum]]
  namepass = ["shelly_blu"]
  [[processors.enum.mapping]]
    field = "value"
    dest = "motion"
    default = 0
    [processors.enum.mapping.value_mappings]
      "ON" = 1
      "OFF" = 0

[[processors.enum]]
  namepass = ["shelly_blu"]
  [[processors.enum.mapping]]
    field = "state"
    dest = "motion"
    default = 0
    [processors.enum.mapping.value_mappings]
      "ON" = 1
      "OFF" = 0


[[inputs.mqtt_consumer]]
  servers = ["tcp://mosquitto:1883"]
  topics = ["shellies/blu/group/+/direction"]
  username = "${MQTT_USER}"
  password = "${MQTT_PASSWORD}"
  qos = 1
  persistent_session = false
  topic_tag = "topic"
  data_format = "value"
  data_type = "string"
  name_override = "shelly_blu_flow"

[[inputs.mqtt_consumer]]
  servers = ["tcp://mosquitto:1883"]
  topics = ["shellies/blu/group/+/event"]
  username = "${MQTT_USER}"
  password = "${MQTT_PASSWORD}"
  qos = 1
  persistent_session = false
  topic_tag = "topic"
  data_format = "json_v2"
  name_override = "shelly_blu_flow"

  [[inputs.mqtt_consumer.json_v2]]
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "direction"
      rename = "direction"
      type = "string"
      optional = true
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "door_mac"
      rename = "door_mac"
      type = "string"
      optional = true
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "motion_mac"
      rename = "motion_mac"
      type = "string"
      optional = true
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "trigger_mac"
      rename = "trigger_mac"
      type = "string"
      optional = true
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "ts"
      rename = "event_ts"
      type = "int"
      optional = true

[[processors.regex]]
  namepass = ["shelly_blu_flow"]
  [[processors.regex.tags]]
    key = "topic"
    pattern = "shellies/blu/group/([^/]+)/.*"
    replacement = "$$1"
    result_key = "group"

[[processors.enum]]
  namepass = ["shelly_blu_flow"]
  [[processors.enum.mapping]]
    field = "value"
    dest = "direction_code"
    default = 0
    [processors.enum.mapping.value_mappings]
      "enter" = 1
      "exit" = -1

[[processors.enum]]
  namepass = ["shelly_blu_flow"]
  [[processors.enum.mapping]]
    field = "direction"
    dest = "direction_code"
    default = 0
    [processors.enum.mapping.value_mappings]
      "enter" = 1
      "exit" = -1

# ------------------------------
# Host-Metriken (Rechner)
# ------------------------------
[[inputs.cpu]]
  # pro Core + Gesamtwert für Dashboard-Panels
  percpu = true
  totalcpu = true
  collect_cpu_time = true

[[inputs.mem]]
[[inputs.swap]]
[[inputs.system]]

[[inputs.disk]]
  ignore_fs = ["tmpfs", "devtmpfs", "devfs", "overlay", "squashfs", "nsfs", "aufs"]

[[inputs.net]]
[[inputs.processes]]

# Raspberry Pi CPU/GPU-Temperatur (gemäß Anleitung)
[[inputs.file]]
  files = ["/sys/class/thermal/thermal_zone0/temp"]
  name_override = "cpu_temperature"
  data_format = "value"
  data_type = "integer"

[[inputs.exec]]
  commands = [ "/opt/vc/bin/vcgencmd measure_temp" ]
  name_override = "gpu_temperature"
  data_format = "grok"
  grok_patterns = ["%{NUMBER:value:float}"]

# Achtung: hohe Cardinality bei vielen Prozessen
[[inputs.procstat]]
  pattern = ".*"
  pid_finder = "native"
  tag_with = ["pid"]
  properties = ["cpu", "memory"]

[[outputs.influxdb_v2]]
  urls = ["http://influxdb:8086"]
  token = "${INFLUXDB_WRITE_TOKEN}"
  organization = "${INFLUXDB_ORG}"
  bucket = "${INFLUXDB_BUCKET}"

[[outputs.file]]
  files = ["stdout"]
  data_format = "influx"
