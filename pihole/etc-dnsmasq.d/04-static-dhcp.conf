# Static DHCP leases for Pi-hole dnsmasq.
# Format:
# dhcp-host=<MAC-ADDRESS>,<IP-ADDRESS>,<HOSTNAME>,infinite
#
# Example entries (replace MAC addresses with your real device MACs):
# dhcp-host=AA:BB:CC:DD:EE:01,192.168.1.3,darksiddious,infinite
# dhcp-host=AA:BB:CC:DD:EE:02,192.168.1.101,lightsiddious,infinite
