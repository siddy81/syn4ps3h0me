name: syn4ps3h0me

x-auth-env: &auth-env
  MQTT_USER: ${MQTT_USER}
  MQTT_PASSWORD: ${MQTT_PASSWORD}



x-influx-init-env: &influx-init-env
  DOCKER_INFLUXDB_INIT_MODE: ${INFLUXDB_INIT_MODE}
  DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUXDB_USERNAME}
  DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUXDB_PASSWORD}
  DOCKER_INFLUXDB_INIT_ORG: ${INFLUXDB_ORG}
  DOCKER_INFLUXDB_INIT_BUCKET: ${INFLUXDB_BUCKET}
  DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUXDB_WRITE_TOKEN}

services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mqtt-broker
    hostname: pihole.${INTRANET_DOMAIN}
    restart: unless-stopped
    networks:
      - intranet
    ports:
      - "1883:1883"
    environment:
      <<: *auth-env
    volumes:
      - ./mosquitto/config:/mosquitto/config:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    command:
      - sh
      - -ec
      - |
        if [ ! -f /mosquitto/data/passwd ]; then
          echo "Create passwd file"
          mosquitto_passwd -b -c /mosquitto/data/passwd "$$MQTT_USER" "$$MQTT_PASSWORD"
        else
          echo "Update passwd for user $$MQTT_USER"
          mosquitto_passwd -b /mosquitto/data/passwd "$$MQTT_USER" "$$MQTT_PASSWORD"
        fi

        chmod 600 /mosquitto/data/passwd
        exec mosquitto -c /mosquitto/config/mosquitto.conf

  influxdb:
    image: influxdb:2
    container_name: influx-db
    hostname: nightmaresiddious.${INTRANET_DOMAIN}
    restart: unless-stopped
    networks:
      - intranet
    ports:
      - "8086:8086"
    environment:
      <<: *influx-init-env
    volumes:
      - influxdb_data:/var/lib/influxdb2
      - influxdb_config:/etc/influxdb2

  telegraf:
    image: telegraf:1.38
    container_name: telegraf-agent
    hostname: nightmaresiddious.${INTRANET_DOMAIN}
    restart: unless-stopped
    networks:
      - intranet
    depends_on:
      - mosquitto
      - influxdb
    pid: "host"
    environment:
      <<: *auth-env
      INFLUXDB_ORG: ${INFLUXDB_ORG}
      INFLUXDB_BUCKET: ${INFLUXDB_BUCKET}
      INFLUXDB_WRITE_TOKEN: ${INFLUXDB_WRITE_TOKEN}
      HOST_PROC: /hostfs/proc
      HOST_SYS: /hostfs/sys
      HOST_ETC: /hostfs/etc
      HOST_MOUNT_PREFIX: /hostfs
    volumes:
      - /:/hostfs:ro
      - ./telegraf/telegraf.conf:/etc/telegraf/telegraf.conf:ro
    command:
      - --non-strict-env-handling
      - --config
      - /etc/telegraf/telegraf.conf

  grafana:
    image: grafana/grafana:latest
    container_name: grafana-ui
    hostname: nightmaresiddious.${INTRANET_DOMAIN}
    restart: unless-stopped
    networks:
      - intranet
    depends_on:
      - influxdb
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_FEATURE_TOGGLES_ENABLE: publicDashboards
      INFLUXDB_ORG: ${INFLUXDB_ORG:-home}
      INFLUXDB_BUCKET: ${INFLUXDB_BUCKET}
      INFLUXDB_WRITE_TOKEN: ${INFLUXDB_WRITE_TOKEN}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro

  pihole:
    image: pihole/pihole:latest
    container_name: pi-hole
    hostname: nightmaresiddious.${INTRANET_DOMAIN}
    restart: unless-stopped
    networks:
      - intranet
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "8088:80/tcp"
    dns:
      - 1.1.1.1
      - 9.9.9.9
    environment:
      TZ: ${TZ:-Europe/Berlin}
      # Pi-hole Docker config (FTLCONF_*)
      FTLCONF_webserver_api_password: ${PIHOLE_API_PASSWORD}
      FTLCONF_webserver_interface_theme: ${PIHOLE_WEBTHEME:-default-darker}
      FTLCONF_dns_upstreams: ${PIHOLE_DNS_UPSTREAMS:-1.1.1.1;1.0.0.1;1.1.1.1;9.9.9.9}
      FTLCONF_dns_rateLimit_interval: 60
      FTLCONF_dns_rateLimit_count: 2000
      FTLCONF_dns_dnssec: ${PIHOLE_DNSSEC:-true}
      FTLCONF_dns_listeningMode: all
      # Backward-compatible aliases
      WEBPASSWORD: ${PIHOLE_ADMIN_PASSWORD}
      WEBTHEME: ${PIHOLE_WEBTHEME:-default-darker}
      DNSMASQ_LISTENING: all
      FTLCONF_LOCAL_IPV4: ${RPI_IP}
      FTLCONF_dhcp_active: ${PIHOLE_DHCP_ACTIVE}
      FTLCONF_dhcp_start: ${PIHOLE_DHCP_START}
      FTLCONF_dhcp_end: ${PIHOLE_DHCP_END}
      FTLCONF_dhcp_router: ${PIHOLE_DHCP_ROUTER}
      FTLCONF_dhcp_leaseTime: ${PIHOLE_DHCP_LEASETIME:-24h}
      FTLCONF_dns_hosts: |-
        192.168.1.1 fritzbox.arkham.asylum
        192.168.1.3 darksiddious.arkham.asylum
        192.168.1.4 padawan.arkham.asylum
        192.168.1.5 batman.arkham.asylum
        192.168.1.101 nightmaresiddious.arkham.asylum
        192.168.1.85 wohnzimmerlampe.arkham.asylum

    volumes:
      - ./pihole/etc-pihole:/etc/pihole
      - ./pihole/etc-dnsmasq.d:/etc/dnsmasq.d
      - ./pihole/adlists.list:/etc/pihole/adlists.list
      - ./pihole/lighttpd-external.conf:/etc/lighttpd/external.conf:ro
    cap_add:
      - NET_ADMIN
      - SYS_TIME
      - SYS_NICE

  caddy:
    image: caddy:2
    container_name: caddy-proxy
    hostname: nightmaresiddious.${INTRANET_DOMAIN}
    restart: unless-stopped
    networks:
      - intranet
    depends_on:
      - grafana
      - pihole
    ports:
      - "80:80"
      - "443:443"
    environment:
      GRAFANA_DOMAIN: ${PIHOLE_DOMAIN}
      PIHOLE_DOMAIN: ${PIHOLE_DOMAIN}
      LEGACY_HOST_DOMAIN: ${PIHOLE_DOMAIN}
      LEGACY_HOST_IP: ${LEGACY_HOST_IP}
    command: ["caddy", "run", "--config", "/etc/caddy/config.json"]
    volumes:
      - ./caddy/config.json:/etc/caddy/config.json:ro
      - caddy_data:/data



  voice-pipeline:
    build:
      context: ./voice-pipeline
    container_name: voice-pipeline
    hostname: voice.${INTRANET_DOMAIN:-arkham.asylum}
    restart: unless-stopped
    user: "${VOICE_HOST_UID:-1000}:${VOICE_HOST_GID:-1000}"
    networks:
      - intranet
    extra_hosts:
      - "host.docker.internal:host-gateway"
    devices:
      - /dev/snd:/dev/snd
    group_add:
      - audio
    volumes:
      - /run/user/${VOICE_HOST_UID:-1000}:/run/user/${VOICE_HOST_UID:-1000}
      - ${VOICE_HAILO_APPS_DIR:-/home/siddy/workspace/hailo-apps}:/home/siddy/workspace/hailo-apps:ro
      - ${VOICE_WHISPER_CACHE_DIR:-/home/siddy/.cache/huggingface}:/models/huggingface
      - ./voice-pipeline/app/config/shelly_devices.example.json:/app/app/config/shelly_devices.example.json:ro
    environment:
      TZ: ${TZ:-Europe/Berlin}
      XDG_RUNTIME_DIR: /run/user/${VOICE_HOST_UID:-1000}
      PULSE_SERVER: unix:/run/user/${VOICE_HOST_UID:-1000}/pulse/native
      PIPEWIRE_REMOTE: pipewire-0
      AUDIO_SAMPLE_RATE: ${VOICE_AUDIO_SAMPLE_RATE:-16000}
      WAKE_WORD_THRESHOLD: ${VOICE_WAKE_WORD_THRESHOLD:-0.5}
      WAKE_EVENT_COOLDOWN_SECONDS: ${VOICE_WAKE_EVENT_COOLDOWN_SECONDS:-2.0}
      WAKEWORD_MODEL: ${VOICE_WAKEWORD_MODEL}
      WAKEWORD_MODELS: ${VOICE_WAKEWORD_MODELS:-}
      WAKEWORD_MODEL_PATH: ${VOICE_WAKEWORD_MODEL_PATH:-}
      WAKEWORD_MODEL_PATHS: ${VOICE_WAKEWORD_MODEL_PATHS:-}
      POST_WAKE_RECORD_SECONDS: ${VOICE_POST_WAKE_RECORD_SECONDS:-6}
      POST_WAKE_MIN_RECORD_SECONDS: ${VOICE_POST_WAKE_MIN_RECORD_SECONDS:-0.45}
      POST_WAKE_SILENCE_SECONDS: ${VOICE_POST_WAKE_SILENCE_SECONDS:-0.35}
      POST_WAKE_SILENCE_RMS_THRESHOLD: ${VOICE_POST_WAKE_SILENCE_RMS_THRESHOLD:-550}
      AUDIO_DEVICE_REFRESH_SECONDS: ${VOICE_AUDIO_DEVICE_REFRESH_SECONDS:-30}
      WHISPER_MODE: ${VOICE_WHISPER_MODE:-auto}
      WHISPER_MODEL: ${VOICE_WHISPER_MODEL:-openai/whisper-base}
      WHISPER_LANGUAGE: ${VOICE_WHISPER_LANGUAGE:-de}
      WHISPER_CACHE_DIR: /models/huggingface
      WHISPER_PRELOAD: ${VOICE_WHISPER_PRELOAD:-true}
      HF_HOME: /models/huggingface
      LLM_BASE_URL: ${VOICE_LLM_BASE_URL:-http://host.docker.internal:8000}
      LLM_MODEL: ${VOICE_LLM_MODEL:-qwen2-1.5b-instruct-function-calling-v1}
      LLM_CHAT_MODEL: ${VOICE_LLM_CHAT_MODEL:-llama3.2:3b}
      LLM_TIMEOUT_SECONDS: ${VOICE_LLM_TIMEOUT_SECONDS:-45}
      LLM_EXPECT_HAILO: ${VOICE_LLM_EXPECT_HAILO:-true}
      LLM_PULL_ON_PRELOAD_MISS: ${VOICE_LLM_PULL_ON_PRELOAD_MISS:-true}
      LLM_STRICT_HAILO_LIST: ${VOICE_LLM_STRICT_HAILO_LIST:-false}
      SHELLY_DEVICE_MAP_FILE: ${SHELLY_DEVICE_MAP_FILE:-/app/app/config/shelly_devices.json}
      SHELLY_DEVICE_MAP_JSON: ${SHELLY_DEVICE_MAP_JSON:-}
      SHELLY_DEFAULT_COMMAND_PATH: ${SHELLY_DEFAULT_COMMAND_PATH:-/script/light-control}
      SHELLY_TIMEOUT_SECONDS: ${SHELLY_TIMEOUT_SECONDS:-5}
      DEVICE_REGISTRATION_TOKEN: ${DEVICE_REGISTRATION_TOKEN:-CHANGE_ME}
      DEVICE_HEARTBEAT_TIMEOUT_SEC: ${DEVICE_HEARTBEAT_TIMEOUT_SEC:-120}
      DEVICE_REGISTRY_PORT: ${DEVICE_REGISTRY_PORT:-8091}
      TTS_SHELL_COMMAND: ${VOICE_TTS_SHELL_COMMAND:-}
      TTS_AUTO_ENABLED: ${VOICE_TTS_AUTO_ENABLED:-true}
      TTS_LANGUAGE: ${VOICE_TTS_LANGUAGE:-de}
      READY_ANNOUNCEMENT_ENABLED: ${VOICE_READY_ANNOUNCEMENT_ENABLED:-true}
      READY_ANNOUNCEMENT_TEXT: ${VOICE_READY_ANNOUNCEMENT_TEXT:-Ich bin jetzt einsatzbereit.}
      WAKE_BEEP_ENABLED: ${VOICE_WAKE_BEEP_ENABLED:-true}
      WAKE_BEEP_FREQUENCY_HZ: ${VOICE_WAKE_BEEP_FREQUENCY_HZ:-880}
      WAKE_BEEP_DURATION_MS: ${VOICE_WAKE_BEEP_DURATION_MS:-120}
      WAKE_BEEP_VOLUME: ${VOICE_WAKE_BEEP_VOLUME:-0.25}
    healthcheck:
      test: ["CMD-SHELL", "pactl list sources short >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 25s

  open-webui:
    image: ${OPEN_WEBUI_IMAGE:-ghcr.io/open-webui/open-webui:main}
    container_name: open-webui
    hostname: open-webui.${INTRANET_DOMAIN}
    restart: always
    network_mode: host
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      TZ: ${TZ:-Europe/Berlin}
      OLLAMA_BASE_URL: ${OPEN_WEBUI_OLLAMA_BASE_URL:-http://127.0.0.1:8000}
      WEBUI_ADMIN_EMAIL: ${OPEN_WEBUI_ADMIN_EMAIL}
      WEBUI_ADMIN_PASSWORD: ${OPEN_WEBUI_ADMIN_PASSWORD}
      WEBUI_ADMIN_NAME: ${OPEN_WEBUI_ADMIN_NAME}
    volumes:
      - open-webui:/app/backend/data
      - ./open-webui/knowledge:/app/backend/data/knowledge-import:ro


  open-webui-knowledge-sync:
    image: python:3.12-alpine
    container_name: open-webui-knowledge-sync
    restart: unless-stopped
    network_mode: host
    depends_on:
      - open-webui
    environment:
      OPEN_WEBUI_BASE_URL: ${OPEN_WEBUI_BASE_URL:-http://127.0.0.1:8080}
      OPEN_WEBUI_ADMIN_EMAIL: ${OPEN_WEBUI_ADMIN_EMAIL}
      OPEN_WEBUI_ADMIN_PASSWORD: ${OPEN_WEBUI_ADMIN_PASSWORD}
      OPEN_WEBUI_ROOT_KNOWLEDGE_NAME: ${OPEN_WEBUI_ROOT_KNOWLEDGE_NAME:-syn4ps3h0me}
      OPEN_WEBUI_KNOWLEDGE_PREFIX: ${OPEN_WEBUI_KNOWLEDGE_PREFIX:-}
      OPEN_WEBUI_KNOWLEDGE_DESCRIPTION: ${OPEN_WEBUI_KNOWLEDGE_DESCRIPTION:-Automatisch synchronisierte Projekt-Dokumentation}
      OPEN_WEBUI_WORKSPACE_MODEL_ENABLED: ${OPEN_WEBUI_WORKSPACE_MODEL_ENABLED:-true}
      OPEN_WEBUI_WORKSPACE_MODEL_ID: ${OPEN_WEBUI_WORKSPACE_MODEL_ID:-llama3.2-3b-workspace}
      OPEN_WEBUI_WORKSPACE_MODEL_NAME: ${OPEN_WEBUI_WORKSPACE_MODEL_NAME:-Llama 3.2 3B (Workspace)}
      OPEN_WEBUI_WORKSPACE_MODEL_BASE_ID: ${OPEN_WEBUI_WORKSPACE_MODEL_BASE_ID:-llama3.2:3b}
      OPEN_WEBUI_ATTACH_KNOWLEDGE_TO_ALL_MODELS: ${OPEN_WEBUI_ATTACH_KNOWLEDGE_TO_ALL_MODELS:-true}
      KNOWLEDGE_IMPORT_DIR: /knowledge-import
      KNOWLEDGE_SYNC_STATE_FILE: /sync-state/state.json
      KNOWLEDGE_SYNC_INTERVAL_SECONDS: ${KNOWLEDGE_SYNC_INTERVAL_SECONDS:-120}
      KNOWLEDGE_SYNC_RUN_ONCE: ${KNOWLEDGE_SYNC_RUN_ONCE:-false}
      KNOWLEDGE_SYNC_EXTENSIONS: ${KNOWLEDGE_SYNC_EXTENSIONS:-txt,md,pdf,docx,doc,rtf,csv,json}
    volumes:
      - ./open-webui/knowledge:/knowledge-import:ro
      - ./open-webui/knowledge/sync_knowledge.py:/app/sync_knowledge.py:ro
      - open-webui-knowledge-sync-state:/sync-state
    command:
      - sh
      - -ec
      - |
        pip install --no-cache-dir requests
        python /app/sync_knowledge.py



networks:
  intranet:
    name: intranet

volumes:
  influxdb_data:
  influxdb_config:
  grafana_data:
  mosquitto_data:
  mosquitto_log:
  caddy_data:
  open-webui:
  open-webui-knowledge-sync-state:
